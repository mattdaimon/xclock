<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>xclock</title>
  <link rel="icon" href="xclock.ico" type="image/x-icon">
  <style>
    :root { color-scheme: light; }
    html, body {
      width: 100%; height: 100%; margin: 0; overflow: hidden;
      background: #ffffff;
    }
    body { display: grid; place-items: center; user-select: none; }
    canvas { display: block; aspect-ratio: 1 / 1; background: #ffffff; }
  </style>
</head>
<body>
  <canvas id="clock" aria-label="xclock"></canvas>
  <script>
    (() => {
      "use strict";

      const canvas = document.getElementById("clock");
      const ctx = canvas.getContext("2d");
      let cssSize = 0;
      let dpr = 1;

      function resizeCanvas() {
        cssSize = Math.floor(Math.min(window.innerWidth, window.innerHeight));
        dpr = window.devicePixelRatio || 1;

        canvas.style.width = `${cssSize}px`;
        canvas.style.height = `${cssSize}px`;
        canvas.width = Math.round(cssSize * dpr);
        canvas.height = Math.round(cssSize * dpr);

        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }

      function point(cx, cy, angle, forward, side = 0) {
        return {
          x: cx + Math.sin(angle) * forward + Math.cos(angle) * side,
          y: cy - Math.cos(angle) * forward + Math.sin(angle) * side
        };
      }

      function fillPolygon(points) {
        ctx.beginPath();
        ctx.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length; i++) {
          ctx.lineTo(points[i].x, points[i].y);
        }
        ctx.closePath();
        ctx.fill();
      }

      function drawTicks(cx, cy, radius) {
        ctx.strokeStyle = "#000000";
        ctx.lineCap = "butt";

        for (let i = 0; i < 60; i++) {
          const angle = (i / 60) * Math.PI * 2;
          const isHour = i % 5 === 0;
          const outer = radius * 0.985;
          const inner = isHour ? radius * 0.900 : radius * 0.945;
          const start = point(cx, cy, angle, inner);
          const end = point(cx, cy, angle, outer);

          ctx.beginPath();
          ctx.lineWidth = isHour
            ? Math.max(1.35, radius * 0.0085)
            : Math.max(1.00, radius * 0.0058);
          ctx.moveTo(start.x, start.y);
          ctx.lineTo(end.x, end.y);
          ctx.stroke();
        }
      }

      function drawTriangleHand(cx, cy, angle, radius, lengthRatio, halfWidthRatio) {
        const tip = point(cx, cy, angle, radius * lengthRatio);
        const leftBase = point(cx, cy, angle, -radius * 0.075, radius * halfWidthRatio);
        const rightBase = point(cx, cy, angle, -radius * 0.075, -radius * halfWidthRatio);
        fillPolygon([tip, leftBase, rightBase]);
      }

      function drawClock() {
        const rect = canvas.getBoundingClientRect();
        const width = rect.width;
        const height = rect.height;
        const diameter = Math.min(width, height);

        ctx.clearRect(0, 0, width, height);

        const cx = width / 2;
        const cy = height / 2;
        const radius = diameter * 0.46;

        ctx.fillStyle = "#000000";
        drawTicks(cx, cy, radius);

        const now = new Date();
        const minutes = now.getMinutes();
        const hours = (now.getHours() % 12) + minutes / 60;

        drawTriangleHand(cx, cy, (hours / 12) * Math.PI * 2, radius, 0.40, 0.068);
        drawTriangleHand(cx, cy, (minutes / 60) * Math.PI * 2, radius, 0.68, 0.068);

        ctx.beginPath();
        ctx.arc(cx, cy, Math.max(1.5, radius * 0.017), 0, Math.PI * 2);
        ctx.fill();
      }

      let minuteTimerId = null;

      function scheduleNextMinute() {
        if (minuteTimerId !== null) {
          clearTimeout(minuteTimerId);
        }

        const now = new Date();
        const delay =
          (60 - now.getSeconds()) * 1000 - now.getMilliseconds();

        minuteTimerId = setTimeout(() => {
          drawClock();
          scheduleNextMinute();
        }, delay);
      }

      window.addEventListener("resize", () => {
        resizeCanvas();
        drawClock();
      });

      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
          drawClock();
          scheduleNextMinute();
        }
      });

      resizeCanvas();
      drawClock();
      scheduleNextMinute();
    })();
  </script>
</body>
</html>
